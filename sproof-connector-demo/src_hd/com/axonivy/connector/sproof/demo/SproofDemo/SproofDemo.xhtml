<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:ic="http://ivyteam.ch/jsf/component"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
	<ui:composition template="/layouts/frame-10-full-width.xhtml">
		<ui:define name="title">Sproof Demo</ui:define>
		<ui:define name="content">

			<h:form id="form">
				<p:growl showDetail="true" skipDetailIfEqualsSummary="true"/>
				<div class="ui-fluid">
					<p:fieldset legend="Signer 1">
						<div class="grid">
							<div class="col-12 md:col-12 lg:col-4 p-text-right">
								<p:outputLabel value="First name" for="@next"/>
								<p:inputText value="#{data.signer1FirstName}" />
							</div>
							<div class="col-12 md:col-12 lg:col-4 p-text-right">
								<p:outputLabel value="Last name" for="@next"/>
								<p:inputText value="#{data.signer1LastName}" />
							</div>
							<div class="col-12 md:col-12 lg:col-4 p-text-right">
								<p:outputLabel value="Email" for="@next"/>
								<p:inputText value="#{data.signer1Email}" />
							</div>
						</div>
					</p:fieldset>
					<p:spacer height="1em"></p:spacer>
					<p:fieldset legend="Signer 2">
						<div class="grid">
							<div class="col-12 md:col-12 lg:col-4 p-text-right">
								<p:outputLabel value="First name" />
								<p:inputText value="#{data.signer2FirstName}" />
							</div>
							<div class="col-12 md:col-12 lg:col-4 p-text-right">
								<p:outputLabel value="Last name" />
								<p:inputText value="#{data.signer2LastName}" />
							</div>
							<div class="col-12 md:col-12 lg:col-4 p-text-right">
								<p:outputLabel value="Email" />
								<p:inputText value="#{data.signer2Email}" />
							</div>
						</div>
					</p:fieldset>
					<p:spacer height="1em"></p:spacer>
					
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-3 p-text-right">
							<p:commandButton actionListener="#{logic.createFixed}"
								value="Create fixed document" update="form" />
						</div>
						<div class="col-12 md:col-12 lg:col-6 p-text-right">
						</div>
						<div class="col-12 md:col-12 lg:col-3 p-text-right">
							<p:commandButton actionListener="#{logic.createPlaceholders}"
								value="Create document with placeholders" update="form" />
						</div>
					</div>
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-4 p-text-right">
						</div>
						<div class="col-12 md:col-12 lg:col-4 p-text-right">
							<p:commandButton actionListener="#{logic.send}" disabled="#{data.usePlaceholders == null}"
								value="#{data.usePlaceholders == null ? 'Create before sending' : data.usePlaceholders ? 'Send to Sproof for Signing with placeholders' : 'Send to Sproof for Signing'}" update="form" />
						</div>
					</div>
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-4 p-text-right">
						</div>
						<div class="col-12 md:col-12 lg:col-4 p-text-right">
							<p:outputLabel for="@next" value="Member Id of signature request"/>
							<p:inputText value="#{data.memberId}" update="form"/>
						</div>
					</div>
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-4 p-text-right">
						</div>
						<div class="col-12 md:col-12 lg:col-4 p-text-right">
							<p:commandButton actionListener="#{logic.fetch}"
								value="Fetch from Sproof" update="form" />
						</div>
					</div>
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-12 p-text-right">
							<pe:documentViewer height="500" value="#{data.streamedContent}"
								zoom="page-width" />
						</div>
					</div>
					<div class="grid">
						<div class="col-12 md:col-12 lg:col-12 p-text-right">
							<p:inputTextarea readonly="true" autoResize="true" class="output" value="#{data.out}"/>
						</div>
					</div>
				</div>
				<div class="command-btns">
					<p:commandLink id="cancel"
						actionListener="#{ivyWorkflowView.cancel()}" process="@this"
						value="Cancel" />
				</div>
			</h:form>

		</ui:define>
	</ui:composition>
</h:body>

</html>
